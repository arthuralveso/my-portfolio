<section id="contact" aria-labelledby="contact-heading" class="section bg-gradient-to-b from-gray-950 to-gray-900">
  <div class="container">
    <h2 id="contact-heading" fadeInUp [delay]="0" class="section-title">{{ t().contact.title }}</h2>
    <div
      fadeInUp
      [delay]="100"
      class="w-20 h-1 bg-gradient-to-r from-emerald-500 to-cyan-500 mx-auto rounded-full mb-16"
    ></div>

    <div fadeInUp [delay]="200" class="contact-grid">
      <p class="contact-subtitle">{{ t().contact.subtitle }}</p>

      <!-- Email + Phone -->
      <div class="contact-primary" aria-label="Primary contact information">
        <a
          *ngFor="let contact of primaryContacts(); trackBy: trackByLabel"
          [href]="contact.href"
          [attr.aria-label]="contact.ariaLabel"
          class="contact-card bg-slate-900 border border-slate-700/50"
        >
          <span class="contact-card__icon" aria-hidden="true">
            <lucide-icon [img]="contact.icon" [size]="18" color="rgb(52 211 153)"></lucide-icon>
          </span>
          <div class="contact-card__body">
            <span class="contact-card__label">{{ contact.label }}</span>
            <span class="contact-card__value">{{ contact.value }}</span>
          </div>
        </a>
      </div>

      <!-- Social networks (icon only) -->
      <div class="contact-social" aria-label="Social networks">
        <a
          *ngFor="let contact of socialContacts(); trackBy: trackByLabel"
          [href]="contact.href"
          [attr.aria-label]="contact.ariaLabel"
          class="contact-card contact-card--social bg-slate-900 border border-slate-700/50"
          target="_blank"
          rel="noopener noreferrer"
        >
          <lucide-icon [img]="contact.icon" [size]="20" color="rgb(52 211 153)" aria-hidden="true"></lucide-icon>
        </a>
      </div>
    </div>
  </div>
</section>
