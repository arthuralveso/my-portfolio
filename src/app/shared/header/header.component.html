<header class="header" [class.header--scrolled]="isScrolled || menuOpen">
  <div class="header__inner">
    <button
      type="button"
      class="header__logo"
      (click)="scrollTo('home')"
      aria-label="Arthur Alves – go to top of page"
    >
      <lucide-icon
        [img]="Code2"
        [size]="18"
        color="rgb(52, 211, 153)"
        aria-hidden="true"
      ></lucide-icon>
      <span>Arthur Alves</span>
    </button>

    <!-- Desktop nav -->
    <nav class="header__nav" aria-label="Main navigation">
      <button
        *ngFor="let item of navItems()"
        type="button"
        class="nav-item"
        [class.nav-item--active]="activeSection === item.id"
        [attr.aria-current]="activeSection === item.id ? 'true' : null"
        (click)="scrollTo(item.id)"
      >
        {{ item.label }}
      </button>
    </nav>

    <!-- Language toggle + Hamburger -->
    <div class="header__actions">
      <button
        type="button"
        class="lang-toggle"
        (click)="toggleLang()"
        [attr.aria-label]="lang() === 'en' ? 'Switch to Portuguese' : 'Mudar para Inglês'"
      >
        <span [class.lang-toggle__opt--active]="lang() === 'en'" aria-hidden="true">EN</span>
        <span class="lang-toggle__sep" aria-hidden="true">|</span>
        <span [class.lang-toggle__opt--active]="lang() === 'pt'" aria-hidden="true">PT</span>
      </button>

      <button
        #hamburgerBtn
        type="button"
        class="hamburger"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen"
        [attr.aria-controls]="'mobile-nav'"
        [attr.aria-label]="menuOpen ? 'Close navigation menu' : 'Open navigation menu'"
      >
        <lucide-icon [img]="menuOpen ? X : Menu" [size]="22" color="#ffffff" aria-hidden="true"></lucide-icon>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <nav
    id="mobile-nav"
    class="mobile-menu"
    [class.mobile-menu--open]="menuOpen"
    [attr.aria-hidden]="!menuOpen"
    aria-label="Mobile navigation"
  >
    <button
      *ngFor="let item of navItems(); let first = first"
      type="button"
      class="mobile-nav-item"
      [class.mobile-nav-item--active]="activeSection === item.id"
      [attr.aria-current]="activeSection === item.id ? 'true' : null"
      [attr.data-first-mobile-nav]="first ? 'true' : null"
      (click)="scrollTo(item.id)"
    >
      {{ item.label }}
    </button>
  </nav>
</header>
