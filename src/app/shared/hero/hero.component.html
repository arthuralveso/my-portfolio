<section
  id="home"
  class="relative min-h-screen flex items-center justify-center px-6 py-20 bg-gradient-to-b from-gray-950 to-gray-900"
>
  <div class="max-w-7xl w-full mx-auto">
    <div class="grid lg:grid-cols-2 gap-8 items-center pl-4 pr-4">
      <div
        class="space-y-6 flex flex-col items-center justify-center text-center lg:items-start lg:text-left"
      >
        <h1
          fadeInUp
          [delay]="0"
          class="text-5xl md:text-6xl lg:text-7xl font-bold text-foreground leading-none"
        >
          Hi, I'm {{ name }}
        </h1>

        <div fadeInUp [delay]="200" class="role-block">
          <p class="role-primary text-foreground">Senior Frontend Engineer</p>
          <p class="role-secondary">& Angular Specialist</p>
        </div>

        <div class="role-divider"></div>

        <p fadeInUp [delay]="400" class="hero-body text-muted-foreground">
          {{ description }}
        </p>

        <div fadeInUp [delay]="600" class="flex flex-wrap gap-4 pt-2">
          <button
            type="button"
            (click)="scrollToSection('work-experience')"
            class="bg-emerald-600 hover:bg-emerald-700 text-[color:var(--primary)] transition-colors duration-300 px-5 py-3 rounded-full font-bold text-sm inline-flex items-center"
          >
            View Work
            <lucide-icon
              [img]="ArrowRight"
              [size]="18"
              class="ml-2"
              aria-hidden="true"
            ></lucide-icon>
          </button>

          <button
            type="button"
            (click)="scrollToSection('contact')"
            class="border border-slate-600 text-muted-foreground hover:bg-slate-800 hover:text-foreground transition-all duration-300 px-5 py-3 rounded-full font-bold text-sm inline-flex items-center"
          >
            <lucide-icon [img]="Mail" [size]="18" class="mr-2" aria-hidden="true"></lucide-icon>
            Contact Me
          </button>

          <a
            href="/assets/resume-arthur-alves.pdf"
            download="Resume-Arthur-Alves.pdf"
            class="border border-slate-600 text-muted-foreground hover:bg-slate-800 hover:text-foreground transition-all duration-300 px-5 py-3 rounded-full font-bold text-sm inline-flex items-center"
          >
            <lucide-icon [img]="Download" [size]="18" class="mr-2" aria-hidden="true"></lucide-icon>
            Resume
          </a>
        </div>
      </div>

      <div
        fadeInUp
        [delay]="300"
        class="flex justify-center lg:justify-end order-first lg:order-last"
      >
        <div class="code-snippet-wrapper">
          <div class="snippet-badge">
            <span class="snippet-dot"></span>
            Angular · Typescript
          </div>
          <div class="snippet-frame">
            <div class="snippet-bar">
              <span class="snippet-dot-r"></span>
              <span class="snippet-dot-y"></span>
              <span class="snippet-dot-g"></span>
              <span class="snippet-filename">arthur-alves-portfolio.component.ts</span>
            </div>
            <div class="snippet-code" #codeBlock></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="scroll-hint" [style.opacity]="scrollHintOpacity">
    <span class="scroll-hint-label">SCROLL</span>
    <div class="scroll-hint-line"></div>
  </div>
</section>
