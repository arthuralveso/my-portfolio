<section id="technologies" class="section bg-gradient-to-b from-gray-900 to-gray-950">
  <div class="container text-center">
    <h2 fadeInUp [delay]="0" class="text-4xl md:text-5xl font-bold text-white mb-4">{{ t().technologies.title }}</h2>
    <div
      fadeInUp
      [delay]="100"
      class="w-20 h-1 bg-gradient-to-r from-emerald-500 to-cyan-500 mx-auto rounded-full mb-16"
    ></div>
    <p fadeInUp [delay]="200" class="text-slate-400 mt-6 max-w-2xl mx-auto text-md mb-16">
      {{ t().technologies.subtitle }}
    </p>

    <div fadeInUp [delay]="300" class="tech-grid" aria-label="Technologies and tools">
      <div
        class="tech-card bg-slate-800/50 border-slate-700/50"
        *ngFor="let tech of technologies; trackBy: trackByName"
      >
        <div class="tech-icon" aria-hidden="true" [style.backgroundColor]="tech.bg">
          @if (tech.svgUrl) {
            <img [src]="tech.svgUrl" style="width: 2rem; height: 2rem" />
          } @else {
            <i [class]="tech.icon + ' colored'" style="font-size: 2rem"></i>
          }
        </div>
        <div class="tech-name">{{ tech.name }}</div>
      </div>
    </div>
  </div>
</section>
